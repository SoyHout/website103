name: CD Test

on:
  workflow_run:
    workflows: ["CI Test"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Add VPS host key
      run: |
        mkdir -p ~/.ssh
        printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H 46.250.239.158 >> ~/.ssh/known_hosts
    
    - name: SSH to VPS
      run: ssh root@46.250.239.158

    - name: Go into project directory and pull latest changes
      run: cd website103 && git pull origin master

    - name: Build and restart Docker containers
      run: |
        docker compose build
        docker compose up -d --wait || true

    - name: migrate database
      run: docker compose exec app php artisan migrate --force

    - name: Clear or Optimize Cache
      run: docker compose exec app php artisan optimize:clear
      
    - name: Clear permission cache
      run: docker compose exec app php artisan permission:cache-reset
